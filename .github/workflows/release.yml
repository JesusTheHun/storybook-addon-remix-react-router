name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm i

      - name: Build packages
        run: pnpm --filter "storybook-addon-remix-react-router" run build

      - name: Vitest cache
        uses: actions/cache@v4
        with:
          path: ./node_modules/.vite/vitest/results.json
          key: vitest-cache-${{ github.ref_name }}
          restore-keys: |
            vitest-cache-${{ github.ref_name }}

      - name: Run tests
        run: pnpm vitest --run

      - name: Release
        run: pnpm --filter "storybook-addon-remix-react-router" run release
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          NPM_CONFIG_PROVENANCE: true